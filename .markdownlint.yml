---
# Markdownlint Configuration

# Allow long lines (tables, URLs)
MD013:
  line_length: 300
  tables: false

# Allow HTML comments (used for autogeneration markers)
MD033:
  allowed_elements:
    - "!--"

# Allow duplicate headings in different sections
MD024:
  siblings_only: true

# Disable table column alignment check (auto-generated tables)
MD060: false
