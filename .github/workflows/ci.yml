---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Validate plugins
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linters
        run: |
          pip install -r requirements-dev.txt
          npm install -g markdownlint-cli2

      - name: Lint YAML
        run: make lint-yaml

      - name: Lint Markdown
        run: make lint-md

      - name: Validate JSON
        run: |
          make lint-json
          echo "marketplace.json is valid JSON"

      - name: Lint REUSE / SPDX
        run: make lint-reuse

  changelog:
    name: Changelog
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify CHANGELOG.md updated
        if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-changelog') }}
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch origin "$BASE_REF" --depth=1
          if git diff --name-only "origin/$BASE_REF...HEAD" | grep -qx CHANGELOG.md; then
            echo "CHANGELOG.md was updated."
          else
            msg="CHANGELOG.md was not updated."
            msg="$msg Add an entry under [Unreleased],"
            msg="$msg or apply the 'skip-changelog' label if this PR genuinely"
            msg="$msg doesn't warrant one (typo fixes, internal CI tweaks, etc.)."
            echo "::error::$msg"
            exit 1
          fi
